{{- if (dig "migration" "enabled" false .Values) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lic-portal.fullname" . }}-migration
  labels:
    {{- include "lic-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ dig "migration" "backoffLimit" 2 .Values }}
  template:
    metadata:
      labels:
        {{- include "lic-portal.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never

      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: migration
          image: "{{ .Values.global.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          command:
            - npm
            - run
            - db:migrate

          envFrom:
            - configMapRef:
                name: {{ include "lic-portal.fullname" . }}
            - secretRef:
                name: {{ default (include "lic-portal.fullname" .) .Values.secret.existingSecret }}

          resources:
            {{- toYaml (dig "migration" "resources" dict .Values) | nindent 12 }}
{{- end }}