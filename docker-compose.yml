services:
  postgres:
    image: postgres:18-alpine
    container_name: lic-portal-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lic_portal
      POSTGRES_PASSWORD: lic_portal_dev
      POSTGRES_DB: lic_portal
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      # PG 18+ : mount sur le parent /var/lib/postgresql (pas /data).
      # PGDATA par défaut de l'image = /var/lib/postgresql/<MAJOR>/docker.
      # Cf. https://github.com/docker-library/postgres/pull/1259 (mergé) et
      # docs Docker Hub officielles. Permet pg_upgrade --link sans souci de
      # mount boundaries entre versions majeures.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lic_portal -d lic_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      postgres
      -c log_statement=none
      -c log_min_duration_statement=200
      -c shared_buffers=256MB
      -c max_connections=50

volumes:
  postgres-data:
    name: lic-portal-v2-postgres-data
